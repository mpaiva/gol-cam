; =============================================================
; gol-cam — Dual-environment monorepo
;
;   dfr1154 — Camera/detector board (ESP32-S3 DFR1154)
;   placar  — Scoreboard board (ESP32 DevKit V1 + 4x MAX7219)
;
; Default env is dfr1154 so `pio run` keeps building the camera.
; To build the scoreboard:  pio run -e placar
;
; Scoreboard firmware lives in src_scoreboard/scoreboard.cpp
; (hardware-debugged: battery operation, WiFi modem-sleep, brightness).
; The src/main_placar.cpp + src/placar_*.cpp split from origin is kept
; as a reference (not compiled).
; =============================================================

[platformio]
default_envs = dfr1154

[env]
framework = arduino
extra_scripts = pre:load_env.py
monitor_speed = 115200

; ----- Camera / detector board -----
[env:dfr1154]
platform = espressif32
board = esp32-s3-devkitc-1

; DFR1154 has N16R8: 16MB Flash, 8MB PSRAM
board_build.flash_size = 16MB
board_build.partitions = partitions.csv
board_build.arduino.memory_type = qio_opi

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_ROLE_CAMERA=1

; Only compile camera firmware (exclude scoreboard + placar references)
build_src_filter =
    +<*>
    -<../src_scoreboard/>
    -<main_placar.cpp>
    -<placar_*.cpp>

upload_speed = 921600

; ----- Scoreboard board -----
[env:placar]
platform = espressif32
board = esp32dev

build_flags =
    -DBOARD_ROLE_PLACAR=1

lib_deps =
    majicdesigns/MD_MAX72XX@^3.5.0

; Compile only the hardware-debugged single-file scoreboard firmware
build_src_filter =
    -<*>
    +<../src_scoreboard/>

upload_speed = 460800
upload_port = /dev/cu.usbserial-0001
monitor_port = /dev/cu.usbserial-0001
