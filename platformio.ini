[platformio]
default_envs = dfr1154

; ---------- Gol-cam (DFR1154 / ESP32-S3) ----------
[env:dfr1154]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; DFR1154 has N16R8: 16MB Flash, 8MB PSRAM
board_build.flash_size = 16MB
board_build.partitions = partitions.csv
board_build.arduino.memory_type = qio_opi

extra_scripts = pre:load_env.py
build_src_filter = +<*> -<../src_scoreboard/>

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

monitor_speed = 115200
upload_speed = 921600


; ---------- Scoreboard (ESP32 DevKit + MAX7219) ----------
[env:scoreboard]
platform = espressif32
board = esp32dev
framework = arduino

extra_scripts = pre:load_env.py
build_src_filter = +<../src_scoreboard/>

lib_deps =
    majicdesigns/MD_MAX72XX@^3.5.0

monitor_speed = 115200
upload_speed = 460800
upload_port = /dev/cu.usbserial-0001
monitor_port = /dev/cu.usbserial-0001
