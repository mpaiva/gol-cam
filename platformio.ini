; =============================================================
; gol-cam — Dual-environment monorepo
;
;   dfr1154 — Camera/detector board (ESP32-S3 DFR1154)
;   placar  — Scoreboard board (ESP32 DevKit V1 + 4x MAX7219)
;
; Default env is dfr1154 so `pio run` keeps building the camera.
; To build the scoreboard:  pio run -e placar
; =============================================================

[platformio]
default_envs = dfr1154

[env]
framework = arduino
extra_scripts = pre:load_env.py
monitor_speed = 115200

; ----- Camera / detector board -----
[env:dfr1154]
platform = espressif32
board = esp32-s3-devkitc-1

; DFR1154 has N16R8: 16MB Flash, 8MB PSRAM
board_build.flash_size = 16MB
board_build.partitions = partitions.csv
board_build.arduino.memory_type = qio_opi

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_ROLE_CAMERA=1

; Only compile camera firmware (exclude placar sources)
build_src_filter =
    +<*>
    -<main_placar.cpp>
    -<placar_*.cpp>

upload_speed = 921600

; ----- Scoreboard board -----
[env:placar]
platform = espressif32
board = esp32dev

build_flags =
    -DBOARD_ROLE_PLACAR=1

lib_deps =
    majicdesigns/MD_MAX72XX@^3.5.0

; Only compile placar firmware (exclude camera sources)
build_src_filter =
    +<main_placar.cpp>
    +<placar_*.cpp>
    -<main.cpp>
    -<web_stream.cpp>

upload_speed = 921600
